<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>
    <link rel="stylesheet" href="/assets/admin/css/style.css">
    <link rel="stylesheet" href="/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="login-auth">

    <div class="login-card card p-4 p-md-5">
        <div class="text-center mb-4">
            <h2 class="brand-logo mb-1">E-STORE</h2>
            <p class="text-muted small">Hệ thống quản trị nội bộ</p>
        </div>

        <form id="adminLoginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Mã nhân viên</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="bi bi-card-list"></i></span>
                    <input type="text" id="adminCode" class="form-control" placeholder="Ví dụ: AD001" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-3 form-check d-flex justify-content-between">
                <div>
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Ghi nhớ</label>
                </div>
                <a href="#" class="text-decoration-none small text-danger">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 mb-3">
                Đăng nhập hệ thống
            </button>

            <div class="text-center">
                <a href="/" class="text-muted small text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Quay lại cửa hàng
                </a>
            </div>
        </form>
    </div>

    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/admin/js/script.js"></script>
</body>

</html>
