<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/client/css/style.css">
    <link rel="stylesheet" href="/assets/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <section class="auth-section py-5 bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-10">
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                        <div class="row g-0">
                            <div class="col-lg-6 d-none d-lg-block auth-bg">
                            </div>

                            <div class="col-lg-6">
                                <div class="card-header bg-white p-0 border-0">
                                    <ul class="nav nav-tabs nav-fill border-0" id="authTab" role="tablist">
                                        <li class="nav-item" role="presentation">
                                            <button
                                                class="nav-link active fw-bold py-3 text-uppercase border-0 rounded-0"
                                                id="login-tab" data-bs-toggle="tab" data-bs-target="#login"
                                                type="button" role="tab">
                                                Đăng Nhập
                                            </button>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <button class="nav-link fw-bold py-3 text-uppercase border-0 rounded-0"
                                                id="register-tab" data-bs-toggle="tab" data-bs-target="#register"
                                                type="button" role="tab">
                                                Đăng Ký
                                            </button>
                                        </li>
                                    </ul>
                                </div>

                                <div class="card-body p-4 p-md-5">
                                    <div class="tab-content" id="authTabContent">

                                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                                            <div class="text-center mb-4">
                                                <h3 class="fw-bold text-danger">Chào mừng trở lại!</h3>
                                                <p class="text-secondary small">Vui lòng đăng nhập để tiếp tục</p>
                                            </div>
                                            <form>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Tên đăng nhập /
                                                        Email</label>
                                                    <input type="text"
                                                        class="form-control rounded-pill px-3 shadow-none"
                                                        placeholder="Username hoặc Email">
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Mật khẩu</label>
                                                    <div class="input-group">
                                                        <input type="password"
                                                            class="form-control rounded-start-pill px-3 shadow-none border-end-0 password-input"
                                                            placeholder="********">
                                                        <span
                                                            class="input-group-text bg-white rounded-end-pill border-start-0 toggle-password"
                                                            style="cursor: pointer;">
                                                            <i class="bi bi-eye-slash text-secondary"></i>
                                                        </span>
                                                    </div>
                                                </div>
                                                <div class="d-flex justify-content-end mb-4 px-2">
                                                    <a href="#" class="text-danger small text-decoration-none">Quên mật
                                                        khẩu?</a>
                                                </div>
                                                <button type="submit"
                                                    class="btn btn-danger w-100 rounded-pill py-2 fw-bold shadow">ĐĂNG
                                                    NHẬP</button>
                                                <div class="text-center mt-3 small text-secondary">
                                                    Chưa có tài khoản? <a href="#"
                                                        class="text-danger text-decoration-none fw-bold"
                                                        id="switchToRegister">Đăng ký ngay</a>
                                                </div>
                                            </form>
                                        </div>

                                        <div class="tab-pane fade" id="register" role="tabpanel">
                                            <div class="text-center mb-4">
                                                <h3 class="fw-bold text-danger mb-1">Tạo tài khoản mới</h3>
                                                <p class="text-secondary small mb-0">Họ tên, Email, SĐT, Tên đăng nhập,
                                                    Mật khẩu, Quên mật khẩu</p>
                                            </div>
                                            <form>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Họ tên</label>
                                                    <input type="text"
                                                        class="form-control rounded-pill px-3 shadow-none"
                                                        placeholder="Lê Gia Bảo">
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Email</label>
                                                    <input type="email"
                                                        class="form-control rounded-pill px-3 shadow-none"
                                                        placeholder="bao@example.com">
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">SĐT</label>
                                                    <input type="tel" class="form-control rounded-pill px-3 shadow-none"
                                                        placeholder="0123456789">
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Tên đăng nhập</label>
                                                    <input type="text"
                                                        class="form-control rounded-pill px-3 shadow-none"
                                                        placeholder="Username">
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label small fw-bold">Mật khẩu</label>
                                                    <div class="input-group">
                                                        <input type="password"
                                                            class="form-control rounded-start-pill px-3 shadow-none border-end-0 password-input"
                                                            placeholder="********">
                                                        <span
                                                            class="input-group-text bg-white rounded-end-pill border-start-0 toggle-password"
                                                            style="cursor: pointer;">
                                                            <i class="bi bi-eye-slash text-secondary"></i>
                                                        </span>
                                                    </div>
                                                </div>
                                                <div class="mb-4">
                                                    <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                                                    <div class="input-group">
                                                        <input type="password"
                                                            class="form-control rounded-start-pill px-3 shadow-none border-end-0 password-input"
                                                            placeholder="********">
                                                        <span
                                                            class="input-group-text bg-white rounded-end-pill border-start-0 toggle-password"
                                                            style="cursor: pointer;">
                                                            <i class="bi bi-eye-slash text-secondary"></i>
                                                        </span>
                                                    </div>
                                                </div>
                                                <div class="d-flex justify-content-end my-4 px-2">
                                                    <a href="#" class="text-danger small text-decoration-none">Quên mật
                                                        khẩu?</a>
                                                </div>
                                                <button type="submit"
                                                    class="btn btn-danger w-100 rounded-pill py-2 fw-bold shadow">ĐĂNG
                                                    KÝ</button>
                                                <div class="text-center mt-3 small text-secondary">
                                                    Đã có tài khoản? <a href="#"
                                                        class="text-danger text-decoration-none fw-bold"
                                                        id="switchToLogin">Đăng nhập</a>
                                                </div>
                                            </form>
                                        </div>

                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
    <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script type="module" src="/assets/client/js/script.js"></script>
</body>

</html>
